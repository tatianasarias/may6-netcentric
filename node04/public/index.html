<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Cars App</h1>

  <h2>Add a Car</h2>

  <form id="carForm" method="POST" action="/api/cars">
    <input type="text" id="brand" placeholder="Brand" name="brand"required>
    <input type="text" id="make" placeholder="Make" name="make" required>
    <input type="number" id="year" placeholder="Year" name="year" required>
    <input type="text" id="color" placeholder="Color" name="color" required>
    <button type="submit">Add Car</button>
  </form>

  <h2>Cars</h2>
  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Year</th>
        <th>Make</th>
        <th>Color</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="carsTableBody"></tbody>
  </table>

  <script>
    const form = document.getElementById("carForm");
    const tableBody = document.getElementById("carsTableBody");

    async function loadCars() {
      const response = await fetch("/api/cars");
      const cars = await response.json();

      tableBody.innerHTML = "";

      cars.forEach(car => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${car.brand}</td>
          <td>${car.year}</td>
          <td>${car.make}</td>
          <td>${car.color}</td>
          <td>
            <button onclick="deleteCar(${car.id})">delete</button>
            <button onclick="updateCar(${car.id})">update</button>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    async function deleteCar(id) {
      await fetch(`/api/cars/${id}`, {
        method: "DELETE"
      });

      loadCars();
    }

    async function updateCar(id) {
      const brand = prompt("New brand:");
      const make = prompt("New make:");
      const year = prompt("New year:");
      const color = prompt("New color:");

      const updatedCar = {
        brand,
        make,
        year,
        color
      };

      await fetch(`/api/cars/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(updatedCar)
      });

      loadCars();
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();

      const newCar = {
        brand: document.getElementById("brand").value,
        make: document.getElementById("make").value,
        year: document.getElementById("year").value,
        color: document.getElementById("color").value
      };

      await fetch("/api/cars", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(newCar)
      });

      form.reset();
      loadCars();
    });

    loadCars();
  </script>
</body>
</html>
